  # ═══════════════════════════════════════════════════════════════════
  # AD-HOC LISTS — /api/admin/adhoc-lists
  # ═══════════════════════════════════════════════════════════════════

  /api/admin/adhoc-lists:
    get:
      tags: [Ad-hoc Lists]
      summary: List all ad-hoc lists for a workspace
      operationId: listAdhocLists
      parameters:
        - name: workspaceId
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Lists with aggregate stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  lists:
                    type: array
                    items:
                      $ref: "#/components/schemas/AdhocListResource"
                  stats:
                    type: object
                    properties:
                      totalLists:
                        type: integer
                      totalRecipients:
                        type: integer
                      savedLists:
                        type: integer

    post:
      tags: [Ad-hoc Lists]
      summary: Create a new ad-hoc list with recipients
      operationId: createAdhocList
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [workspaceId, name, recipients]
              properties:
                workspaceId:
                  type: string
                  format: uuid
                name:
                  type: string
                recipients:
                  type: array
                  items:
                    type: object
                    properties:
                      email:
                        type: string
                      phone:
                        type: string
                      firstName:
                        type: string
                      lastName:
                        type: string
                      properties:
                        type: object
                channel:
                  type: string
                templateId:
                  type: string
                  format: uuid
                savedForReuse:
                  type: boolean
      responses:
        "201":
          description: List created with dedup stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  list:
                    $ref: "#/components/schemas/AdhocListResource"
                  duplicatesRemoved:
                    type: integer
                  recipientCount:
                    type: integer

  /api/admin/adhoc-lists/parse-csv:
    post:
      tags: [Ad-hoc Lists]
      summary: Parse CSV content and return validated recipients
      operationId: parseCSV
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [csvContent]
              properties:
                csvContent:
                  type: string
      responses:
        "200":
          description: Parsed recipients
          content:
            application/json:
              schema:
                type: object
                properties:
                  recipients:
                    type: array
                    items:
                      $ref: "#/components/schemas/AdhocRecipientResource"
                  count:
                    type: integer
                  duplicatesRemoved:
                    type: integer
                  errors:
                    type: array
                    items:
                      type: string

  /api/admin/adhoc-lists/parse-paste:
    post:
      tags: [Ad-hoc Lists]
      summary: Parse pasted text (one email/phone per line)
      operationId: parsePasteList
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text:
                  type: string
      responses:
        "200":
          description: Parsed recipients
          content:
            application/json:
              schema:
                type: object
                properties:
                  recipients:
                    type: array
                    items:
                      $ref: "#/components/schemas/AdhocRecipientResource"
                  count:
                    type: integer
                  duplicatesRemoved:
                    type: integer

  /api/admin/adhoc-lists/{id}:
    get:
      tags: [Ad-hoc Lists]
      summary: Get a list with all recipients
      operationId: getAdhocList
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: workspaceId
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: List with recipients
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/AdhocListResource"
                  - type: object
                    properties:
                      recipients:
                        type: array
                        items:
                          $ref: "#/components/schemas/AdhocRecipientResource"
        "404":
          description: List not found

    delete:
      tags: [Ad-hoc Lists]
      summary: Delete an ad-hoc list and all its recipients
      operationId: deleteAdhocList
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: workspaceId
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: List deleted
        "404":
          description: List not found

  /api/admin/adhoc-lists/{id}/send:
    post:
      tags: [Ad-hoc Lists]
      summary: Trigger message send for all recipients in a list
      operationId: sendAdhocList
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [workspaceId, channel, templateId]
              properties:
                workspaceId:
                  type: string
                  format: uuid
                channel:
                  type: string
                templateId:
                  type: string
                  format: uuid
      responses:
        "202":
          description: Send initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  listId:
                    type: string
                  recipientCount:
                    type: integer
                  channel:
                    type: string
        "409":
          description: List already sending/sent

  /api/admin/adhoc-lists/{id}/stats:
    get:
      tags: [Ad-hoc Lists]
      summary: Get delivery stats for a list
      operationId: getAdhocListStats
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Delivery statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  sent:
                    type: integer
                  failed:
                    type: integer
                  pending:
                    type: integer

  /api/admin/adhoc-lists/{id}/save:
    patch:
      tags: [Ad-hoc Lists]
      summary: Toggle saved-for-reuse flag on a list
      operationId: toggleAdhocListSave
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: workspaceId
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Save status toggled
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  savedForReuse:
                    type: boolean
        "404":
          description: List not found

  # ═══════════════════════════════════════════════════════════════════
  # ENGAGEMENT TRACKING — /api/admin/engagement
  # ═══════════════════════════════════════════════════════════════════

  /api/admin/engagement/summary:
    get:
      tags: [Engagement]
      summary: Channel-by-channel engagement metrics with rates
      operationId: getEngagementSummary
      parameters:
        - name: workspaceId
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: startDate
          in: query
          schema:
            type: string
            format: date-time
        - name: endDate
          in: query
          schema:
            type: string
            format: date-time
        - name: channel
          in: query
          schema:
            type: string
            enum: [Email, SMS, WhatsApp, Push, Webhook]
        - name: broadcastId
          in: query
          schema:
            type: string
            format: uuid
        - name: journeyId
          in: query
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Engagement summary by channel
          content:
            application/json:
              schema:
                type: object
                properties:
                  period:
                    type: object
                    properties:
                      startDate:
                        type: string
                        format: date-time
                      endDate:
                        type: string
                        format: date-time
                  channels:
                    type: array
                    items:
                      type: object
                      properties:
                        channel:
                          type: string
                        sent:
                          type: integer
                        delivered:
                          type: integer
                        opened:
                          type: integer
                        clicked:
                          type: integer
                        failed:
                          type: integer
                        bounced:
                          type: integer
                        spam:
                          type: integer
                        deliveryRate:
                          type: number
                        openRate:
                          type: number
                        clickRate:
                          type: number
                  totals:
                    type: object
                    properties:
                      sent:
                        type: integer
                      delivered:
                        type: integer
                      opened:
                        type: integer
                      clicked:
                        type: integer
                      deliveryRate:
                        type: number
                      openRate:
                        type: number
                      clickRate:
                        type: number

  /api/admin/engagement/timeline:
    get:
      tags: [Engagement]
      summary: Recent engagement events feed
      operationId: getEngagementTimeline
      parameters:
        - name: workspaceId
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: channel
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Recent events
          content:
            application/json:
              schema:
                type: object
                properties:
                  events:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        userId:
                          type: string
                        channel:
                          type: string
                        status:
                          type: string
                        messageId:
                          type: string
                        broadcastId:
                          type: string
                        createdAt:
                          type: string
                          format: date-time

  /api/admin/engagement/heatmap:
    get:
      tags: [Engagement]
      summary: Engagement heatmap by day-of-week and hour
      operationId: getEngagementHeatmap
      parameters:
        - name: workspaceId
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: days
          in: query
          schema:
            type: integer
            default: 7
      responses:
        "200":
          description: Heatmap data
          content:
            application/json:
              schema:
                type: object
                properties:
                  heatmap:
                    type: array
                    items:
                      type: object
                      properties:
                        dayOfWeek:
                          type: integer
                          description: "0=Sun, 6=Sat"
                        hour:
                          type: integer
                        eventCount:
                          type: integer
                        opens:
                          type: integer
                        clicks:
                          type: integer

  /api/admin/engagement/user/{userId}:
    get:
      tags: [Engagement]
      summary: Per-user engagement score (0-100)
      operationId: getUserEngagementScore
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
        - name: workspaceId
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: User engagement score
          content:
            application/json:
              schema:
                type: object
                properties:
                  userId:
                    type: string
                  score:
                    type: integer
                    description: "0-100 engagement score"
                  level:
                    type: string
                    enum: [cold, warm, hot, on_fire]
                  totalMessages:
                    type: integer
                  opened:
                    type: integer
                  clicked:
                    type: integer
                  lastEngagement:
                    type: string
                    format: date-time
        "404":
          description: No engagement data

  /api/admin/engagement/channels:
    get:
      tags: [Engagement]
      summary: List all trackable engagement event types per channel
      operationId: getEngagementChannels
      responses:
        "200":
          description: Channel event types
          content:
            application/json:
              schema:
                type: object
                properties:
                  channels:
                    type: object
                    additionalProperties:
                      type: array
                      items:
                        type: string

  /api/admin/engagement/stream:
    get:
      tags: [Engagement]
      summary: Real-time SSE event stream
      operationId: getEngagementStream
      description: |
        Server-Sent Events stream for real-time engagement tracking.
        Sends heartbeat every 15s. Events include: connected, heartbeat, engagement.
      parameters:
        - name: workspaceId
          in: query
          schema:
            type: string
            format: uuid
            description: Filter to a specific workspace (omit for global stream)
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string

